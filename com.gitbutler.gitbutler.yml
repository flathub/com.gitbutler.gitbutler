id: com.gitbutler.gitbutler
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: gitbutler-tauri
rename-desktop-file: GitButler.desktop
rename-icon: gitbutler-tauri

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --socket=gpg-agent
  - --socket=ssh-auth
  - --filesystem=host
  - --filesystem=xdg-run/gvfsd
  - --own-name=com.gitbutler.app
  - --talk-name=org.freedesktop.secrets

modules:
  - name: git
    cleanup:
      - /share
    make-args:
      - NO_PERL=1
      - NO_TCLTK=1
    make-install-args:
      - INSTALL_SYMLINKS=1
      - NO_PERL=1
      - NO_TCLTK=1
    sources:
      - type: archive
        url: https://www.kernel.org/pub/software/scm/git/git-2.54.0.tar.gz
        sha256: 45e8107643a44e3ce46f5665beb35af3932fb0d70017687905ab5d4e3aafa8eb
        x-checker-data:
          type: anitya
          project-id: 5350
          url-template: https://www.kernel.org/pub/software/scm/git/git-$version.tar.gz

  - name: gitbutler
    buildsystem: simple
    build-commands:
      - ar x GitButler.deb
      - tar xf data.tar.gz
      - mv usr/bin/* /app/bin
      - mv usr/share/* /app/share
    sources:
      - type: file
        only-arches: [x86_64]
        url: https://releases.gitbutler.com/releases/release/0.19.12-3040/linux/x86_64/GitButler_0.19.12_amd64.deb
        sha256: 9a06ee3fced1e17d6ff674bf9002e91811161f7d243d82e5b0df43a43bcecd25
        dest-filename: GitButler.deb
        x-checker-data:
          type: json
          url: https://app.gitbutler.com/api/downloads?channel=release
          version-query: .[0].version
          url-query: .[0].builds[].url | select(endswith("amd64.deb"))
      - type: file
        only-arches: [aarch64]
        url: https://releases.gitbutler.com/releases/release/0.19.12-3040/linux/aarch64/GitButler_0.19.12_arm64.deb
        sha256: b7fba0ae03eb571a3cdc480f47733dea08e84945b3f09c03beab7b1dbcfbbb0c
        dest-filename: GitButler.deb
        x-checker-data:
          type: json
          url: https://app.gitbutler.com/api/downloads?channel=release
          version-query: .[0].version
          url-query: .[0].builds[].url | select(endswith("arm64.deb"))
